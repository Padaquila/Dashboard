<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REMAX Progress Dashboard</title>
  <style>
    :root {
      --blue: #2f6fdd;
      --navy: #174f9f;
      --red: #f02f3d;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: #d9dee7;
      --green: #16a34a;
      --orange: #f59e0b;
      --grey: #cfd6df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Gotham, "Avenir Next", "Montserrat", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--navy);
      color: white;
      padding: 22px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .brand span { color: var(--red); }

    .month-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      padding: 10px 12px;
      border-radius: 12px;
    }

    .month-control label {
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .month-control input {
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      background: white;
      color: var(--navy);
      font-weight: 800;
    }

    input, select, button { font-family: inherit; }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-red { background: var(--red); color: white; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-danger { background: #fee2e2; color: #991b1b; }

    .tabs, .sub-tabs {
      display: flex;
      gap: 10px;
      padding: 18px 28px 0;
      flex-wrap: wrap;
    }

    .sub-tabs {
      padding: 0 0 18px;
    }

    .tab, .sub-tab {
      background: white;
      color: var(--navy);
      padding: 14px 34px;
      border-radius: 14px 14px 0 0;
      font-weight: 900;
      border-bottom: 4px solid transparent;
    }

    .sub-tab {
      border-radius: 12px;
      padding: 12px 22px;
      border-bottom: 0;
    }

    .tab.active, .sub-tab.active {
      background: var(--navy);
      color: white;
      border-bottom-color: var(--red);
    }

    main { padding: 24px 28px 40px; }

    .summary-grid, .project-results-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .project-results-grid {
      grid-template-columns: repeat(3, minmax(220px, 1fr));
    }

    .summary-card, .section, .input-section, .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(16, 24, 40, 0.06);
    }

    .summary-card, .project-card { padding: 18px; min-height: 160px; }

    .summary-card h3, .project-card h3 {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      min-height: 34px;
    }

    .summary-progress-row, .project-progress-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .summary-target, .project-target {
      font-size: 13px;
      color: var(--text);
      line-height: 1.35;
    }

    .summary-target strong, .project-target strong {
      color: var(--navy);
      font-size: 16px;
    }

    .summary-target span, .project-target span {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 800;
    }

    .circle {
      --pct: 0;
      --color: var(--grey);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: conic-gradient(var(--color) calc(var(--pct) * 1%), #edf0f5 0);
      display: grid;
      place-items: center;
      margin: auto;
    }

    .circle-inner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: white;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .summary-circle, .project-circle { width: 76px; height: 76px; flex: 0 0 76px; margin: 0; }
    .summary-circle .circle-inner, .project-circle .circle-inner { width: 58px; height: 58px; font-size: 16px; }

    .section { margin-bottom: 18px; overflow: hidden; }

    .section-header {
      background: var(--navy);
      color: white;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      gap: 12px;
    }

    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; vertical-align: middle; }
    th { color: var(--navy); background: #f8fafc; font-size: 12px; text-transform: uppercase; }

    .bar-wrap { width: 100%; background: #edf0f5; height: 12px; border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .bar { height: 100%; width: 0%; background: var(--grey); border-radius: 999px; }

    .percentage-card { display: inline-block; padding: 8px 12px; border-radius: 999px; font-weight: 900; background: #eef2ff; color: var(--navy); }

    .input-section { padding: 18px; margin-bottom: 18px; }

    .input-section-top { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }

    .section-name {
      font-size: 20px;
      font-weight: 900;
      color: var(--navy);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      width: 100%;
    }

    .metric-editor, .task-editor { border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; background: #fbfcfe; }

    .metric-title-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr auto; gap: 10px; align-items: center; }
    .task-title-row { display: grid; grid-template-columns: 1.6fr 1fr auto; gap: 10px; align-items: center; }

    .editor-grid { display: grid; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 10px; margin-top: 12px; }

    .editor-grid label { font-size: 11px; color: var(--muted); font-weight: 800; text-transform: uppercase; }

    .editor-grid input, .metric-title-row input, .metric-title-row select, .task-title-row input, .task-title-row select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
    }

    .empty { padding: 35px; text-align: center; background: white; border: 1px dashed var(--border); border-radius: 16px; color: var(--muted); }
    .hidden { display: none; }

    @media (max-width: 1100px) {
      .summary-grid, .project-results-grid { grid-template-columns: repeat(2, 1fr); }
      .editor-grid { grid-template-columns: repeat(2, 1fr); }
      .metric-title-row, .task-title-row { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
    }

    @media (max-width: 600px) {
      main { padding: 18px 14px; }
      .tabs { padding-left: 14px; padding-right: 14px; }
      .tab { flex: 1; text-align: center; padding: 14px 10px; }
      .summary-grid, .project-results-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span>RE/MAX</span> Progress Dashboard</div>
    <div class="month-control">
      <label for="dashboardMonth">Period</label>
      <input id="dashboardMonth" type="text" placeholder="April 2026" />
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" id="inputTabBtn">Input</button>
    <button class="tab" id="resultsTabBtn">Results</button>
    <button class="tab" id="projectTabBtn">Project Dashboard</button>
  </nav>

  <main>
    <section id="inputTab">
      <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap;">
        <h1 style="margin:0; color:var(--navy);">Input Dashboard</h1>
        <button class="btn-blue" id="addSectionBtn">+ Add Section</button>
      </div>
      <div id="inputSections"></div>
    </section>

    <section id="resultsTab" class="hidden">
      <div class="summary-grid" id="summaryGrid"></div>
      <div id="resultsSections"></div>
    </section>

    <section id="projectTab" class="hidden">
      <div class="sub-tabs">
        <button class="sub-tab active" id="projectInputSubBtn">Project Input</button>
        <button class="sub-tab" id="projectResultsSubBtn">Project Results</button>
      </div>

      <div id="projectInputPanel">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap;">
          <h1 style="margin:0; color:var(--navy);">Project Input</h1>
          <button class="btn-blue" id="addProjectSectionBtn">+ Add Project Section</button>
        </div>
        <div id="projectInputSections"></div>
      </div>

      <div id="projectResultsPanel" class="hidden">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap;">
          <h1 style="margin:0; color:var(--navy);">Project Results</h1>
        </div>
        <div class="project-results-grid" id="projectResultsGrid"></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'remax_progress_dashboard_v3';
    const MONTH_KEY = 'remax_progress_dashboard_period_v3';
    const PROJECT_KEY = 'remax_project_dashboard_v1';

    let dashboardMonth = localStorage.getItem(MONTH_KEY) || 'April 2026';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || defaultData();
    let projectData = JSON.parse(localStorage.getItem(PROJECT_KEY) || 'null') || defaultProjectData();
    let activeMainTab = 'input';
    let activeProjectSubTab = 'input';

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function createMetric(name = 'New Metric', type = 'target') {
      return { id: uid(), name, type, display: 'circle', dailyA: '', dailyB: '', weeklyA: '', weeklyB: '', monthlyA: '', monthlyB: '' };
    }

    function createTask(name = 'New Task', status = 'Pending') {
      return { id: uid(), name, status };
    }

    function defaultData() {
      return [
        { id: uid(), name: 'Recruitment', metrics: [
          createMetric('Booked Meetings with Potential Agents'),
          createMetric('Meetings Conducted with Collection Agents'),
          createMetric('Agents Hired'),
          createMetric('Collection Agents Signed'),
          createMetric('Brand Ambassadors Signed'),
          createMetric('REMAX Partners Signed')
        ]},
        { id: uid(), name: 'International Referrals', metrics: [
          createMetric('Number of Emails to Agency Managers'),
          createMetric('Webinars Conducted'),
          createMetric('WhatsApp Channel Updates'),
          createMetric('Monthly Response Rate', 'response')
        ]},
        { id: uid(), name: 'Sales & Listings', metrics: [
          createMetric('Quality Listing Obtained'),
          createMetric('Personal Gross Commission Income'),
          createMetric('Team Gross Commission Income'),
          createMetric('Gross Commission Achieved')
        ]},
        { id: uid(), name: 'Education & Exposure', metrics: [
          createMetric('Trainings Conducted'),
          createMetric('Social Media Posts')
        ]}
      ];
    }

    function defaultProjectData() {
      return [
        { id: uid(), name: 'Website', tasks: [createTask('Define website structure', 'Pending'), createTask('Prepare content', 'On Hold'), createTask('Review design', 'In Progress')] },
        { id: uid(), name: 'Webinar', tasks: [createTask('Select topic', 'Pending'), createTask('Prepare invitation list', 'Pending'), createTask('Finalize presentation', 'On Hold')] },
        { id: uid(), name: 'Investment Dinner', tasks: [createTask('Confirm venue', 'Pending'), createTask('Prepare guest list', 'In Progress'), createTask('Prepare pitch deck', 'On Hold')] }
      ];
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(MONTH_KEY, dashboardMonth);
      localStorage.setItem(PROJECT_KEY, JSON.stringify(projectData));
    }

    function showTab(tab) {
      activeMainTab = tab;
      document.getElementById('inputTab').classList.toggle('hidden', tab !== 'input');
      document.getElementById('resultsTab').classList.toggle('hidden', tab !== 'results');
      document.getElementById('projectTab').classList.toggle('hidden', tab !== 'project');
      document.getElementById('inputTabBtn').classList.toggle('active', tab === 'input');
      document.getElementById('resultsTabBtn').classList.toggle('active', tab === 'results');
      document.getElementById('projectTabBtn').classList.toggle('active', tab === 'project');
      render();
    }

    function showProjectSubTab(tab) {
      activeProjectSubTab = tab;
      document.getElementById('projectInputPanel').classList.toggle('hidden', tab !== 'input');
      document.getElementById('projectResultsPanel').classList.toggle('hidden', tab !== 'results');
      document.getElementById('projectInputSubBtn').classList.toggle('active', tab === 'input');
      document.getElementById('projectResultsSubBtn').classList.toggle('active', tab === 'results');
      renderProject();
    }

    function addSection() {
      data.push({ id: uid(), name: 'New Section', metrics: [] });
      save(); render();
    }

    function deleteSection(sectionId) {
      if (!confirm('Delete this section?')) return;
      data = data.filter(s => s.id !== sectionId);
      save(); render();
    }

    function addMetric(sectionId) {
      const section = data.find(s => s.id === sectionId);
      if (!section) return;
      section.metrics.push(createMetric());
      save(); render();
    }

    function deleteMetric(sectionId, metricId) {
      const section = data.find(s => s.id === sectionId);
      if (!section) return;
      section.metrics = section.metrics.filter(m => m.id !== metricId);
      save(); render();
    }

    function updateSection(sectionId, value) {
      const section = data.find(s => s.id === sectionId);
      if (section) section.name = value;
      save(); renderResults();
    }

    function updateMetric(sectionId, metricId, field, value) {
      const section = data.find(s => s.id === sectionId);
      if (!section) return;
      const metric = section.metrics.find(m => m.id === metricId);
      if (metric) metric[field] = value;
      save(); renderResults();
    }

    function addProjectSection() {
      projectData.push({ id: uid(), name: 'New Project Section', tasks: [] });
      save(); renderProject();
    }

    function deleteProjectSection(sectionId) {
      if (!confirm('Delete this project section?')) return;
      projectData = projectData.filter(s => s.id !== sectionId);
      save(); renderProject();
    }

    function updateProjectSection(sectionId, value) {
      const section = projectData.find(s => s.id === sectionId);
      if (section) section.name = value;
      save(); renderProjectResults();
    }

    function addTask(sectionId) {
      const section = projectData.find(s => s.id === sectionId);
      if (!section) return;
      section.tasks.push(createTask());
      save(); renderProject();
    }

    function deleteTask(sectionId, taskId) {
      const section = projectData.find(s => s.id === sectionId);
      if (!section) return;
      section.tasks = section.tasks.filter(t => t.id !== taskId);
      save(); renderProject();
    }

    function updateTask(sectionId, taskId, field, value) {
      const section = projectData.find(s => s.id === sectionId);
      if (!section) return;
      const task = section.tasks.find(t => t.id === taskId);
      if (task) task[field] = value;
      save(); renderProjectResults();
    }

    function updateMonth(value) {
      dashboardMonth = value;
      save();
      renderResults();
    }

    function formatNumber(value) {
      if (value === null || value === undefined || value === '') return '0';
      const stringValue = String(value).replace(/,/g, '').trim();
      if (stringValue === '' || isNaN(Number(stringValue))) return String(value);
      return Number(stringValue).toLocaleString('en-US');
    }

    function labelA(type) {
      if (type === 'target') return 'Target';
      if (type === 'conversion') return 'Total';
      if (type === 'response') return 'Sent';
      return 'Percentage';
    }

    function labelB(type) {
      if (type === 'target') return 'Achieved';
      if (type === 'conversion') return 'Converted';
      if (type === 'response') return 'Responses';
      return 'N/A';
    }

    function calc(metric, period) {
      const a = parseFloat(String(metric[period + 'A']).replace(/,/g, ''));
      const b = parseFloat(String(metric[period + 'B']).replace(/,/g, ''));
      if (metric.type === 'custom') return isNaN(a) ? null : Math.max(0, a);
      if (isNaN(a) || isNaN(b) || a <= 0) return null;
      return Math.max(0, (b / a) * 100);
    }

    function colorFor(pct) {
      if (pct === null) return 'var(--grey)';
      if (pct < 50) return 'var(--red)';
      if (pct < 80) return 'var(--orange)';
      return 'var(--green)';
    }

    function formatPct(pct) {
      if (pct === null) return 'N/A';
      return Math.round(pct) + '%';
    }

    function ratioText(metric, period) {
      if (metric.type === 'custom') return formatPct(calc(metric, period));
      const a = metric[period + 'A'];
      const b = metric[period + 'B'];
      if (!a && !b) return '— / —';
      return formatNumber(b || 0) + ' / ' + formatNumber(a || 0);
    }

    function visual(metric, period) {
      const pct = calc(metric, period);
      const color = colorFor(pct);
      const safePct = pct === null ? 0 : Math.min(pct, 100);
      if (metric.display === 'bar') {
        return '<strong>' + formatPct(pct) + '</strong><div class="bar-wrap"><div class="bar" style="width:' + safePct + '%; background:' + color + ';"></div></div>';
      }
      if (metric.display === 'card') {
        return '<span class="percentage-card" style="color:' + color + ';">' + formatPct(pct) + '</span>';
      }
      return '<div class="circle" style="--pct:' + safePct + '; --color:' + color + ';"><div class="circle-inner">' + formatPct(pct) + '</div></div>';
    }

    function summaryVisual(metric) {
      if (!metric) {
        return '<div class="summary-progress-row"><div class="circle summary-circle" style="--pct:0; --color:var(--grey);"><div class="circle-inner">0</div></div><div class="summary-target">No data</div></div>';
      }

      const pct = calc(metric, 'monthly');
      const color = colorFor(pct);
      const safePct = pct === null ? 0 : Math.min(pct, 100);
      const achieved = metric.type === 'custom' ? formatPct(pct) : formatNumber(metric.monthlyB || 0);
      const target = metric.type === 'custom' ? '100%' : formatNumber(metric.monthlyA || 0);

      return '<div class="summary-progress-row">' +
        '<div class="circle summary-circle" style="--pct:' + safePct + '; --color:' + color + ';"><div class="circle-inner">' + achieved + '</div></div>' +
        '<div class="summary-target"><strong>' + achieved + '</strong> / ' + target + '<span>' + formatPct(pct) + ' achieved</span></div>' +
      '</div>';
    }

    function projectVisual(section) {
      const total = section.tasks.length;
      const done = section.tasks.filter(t => t.status === 'Done').length;
      const pct = total ? Math.round((done / total) * 100) : null;
      const color = colorFor(pct);
      const safePct = pct === null ? 0 : Math.min(pct, 100);

      return '<div class="project-progress-row">' +
        '<div class="circle project-circle" style="--pct:' + safePct + '; --color:' + color + ';"><div class="circle-inner">' + formatPct(pct) + '</div></div>' +
        '<div class="project-target"><strong>' + formatNumber(done) + '</strong> / ' + formatNumber(total) + ' tasks done<span>' + formatPct(pct) + ' completed</span></div>' +
      '</div>';
    }

    function findMonthlyMetric(allMetrics, keywords) {
      return allMetrics.find(m => keywords.some(k => m.name.toLowerCase().includes(k.toLowerCase())));
    }

    function renderInput() {
      const container = document.getElementById('inputSections');
      if (!data.length) {
        container.innerHTML = '<div class="empty">No sections yet. Add your first section.</div>';
        return;
      }

      container.innerHTML = data.map(section => `
        <div class="input-section">
          <div class="input-section-top">
            <input class="section-name" value="${escapeHtml(section.name)}" oninput="updateSection('${section.id}', this.value)" />
            <button class="btn-danger" onclick="deleteSection('${section.id}')">Delete</button>
          </div>
          ${section.metrics.map(metric => `
            <div class="metric-editor">
              <div class="metric-title-row">
                <input value="${escapeHtml(metric.name)}" placeholder="Metric name" oninput="updateMetric('${section.id}', '${metric.id}', 'name', this.value)" />
                <select onchange="updateMetric('${section.id}', '${metric.id}', 'type', this.value)">
                  <option value="target" ${metric.type === 'target' ? 'selected' : ''}>Target Progress</option>
                  <option value="conversion" ${metric.type === 'conversion' ? 'selected' : ''}>Conversion Rate</option>
                  <option value="response" ${metric.type === 'response' ? 'selected' : ''}>Response Rate</option>
                  <option value="custom" ${metric.type === 'custom' ? 'selected' : ''}>Custom Percentage</option>
                </select>
                <select onchange="updateMetric('${section.id}', '${metric.id}', 'display', this.value)">
                  <option value="circle" ${metric.display === 'circle' ? 'selected' : ''}>Progress Circle</option>
                  <option value="bar" ${metric.display === 'bar' ? 'selected' : ''}>Progress Bar</option>
                  <option value="card" ${metric.display === 'card' ? 'selected' : ''}>Percentage Card</option>
                </select>
                <button class="btn-danger" onclick="deleteMetric('${section.id}', '${metric.id}')">Delete Metric</button>
              </div>
              <div class="editor-grid">
                ${['daily','weekly','monthly'].map(period => `
                  <div>
                    <label>${period} ${labelA(metric.type)}</label>
                    <input type="number" value="${metric[period + 'A']}" oninput="updateMetric('${section.id}', '${metric.id}', '${period}A', this.value)" />
                  </div>
                  <div>
                    <label>${period} ${labelB(metric.type)}</label>
                    <input type="number" value="${metric[period + 'B']}" oninput="updateMetric('${section.id}', '${metric.id}', '${period}B', this.value)" ${metric.type === 'custom' ? 'disabled' : ''} />
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
          <div style="margin-top:14px;"><button class="btn-blue" onclick="addMetric('${section.id}')">+ Add Metric</button></div>
        </div>
      `).join('');
    }

    function renderResults() {
      const summary = document.getElementById('summaryGrid');
      const container = document.getElementById('resultsSections');
      const periodText = dashboardMonth || 'Selected Period';
      const allMetrics = data.flatMap(s => s.metrics.map(m => ({ ...m, section: s.name })));

      summary.innerHTML = `
        <div class="summary-card"><h3>Agents Hired — ${escapeHtml(periodText)}</h3>${summaryVisual(findMonthlyMetric(allMetrics, ['Agents Hired']))}</div>
        <div class="summary-card"><h3>Collection Agents Signed — ${escapeHtml(periodText)}</h3>${summaryVisual(findMonthlyMetric(allMetrics, ['Collection Agents Signed', 'Collection Agent Signed']))}</div>
        <div class="summary-card"><h3>Brand Ambassadors Signed — ${escapeHtml(periodText)}</h3>${summaryVisual(findMonthlyMetric(allMetrics, ['Brand Ambassadors Signed', 'Brand Ambassador']))}</div>
        <div class="summary-card"><h3>Gross Team Commission Achieved — ${escapeHtml(periodText)}</h3>${summaryVisual(findMonthlyMetric(allMetrics, ['Team Gross Commission Income', 'Gross Team Commission Achieved', 'Team Gross Commission']))}</div>
        <div class="summary-card"><h3>Gross Commission Achieved — ${escapeHtml(periodText)}</h3>${summaryVisual(findMonthlyMetric(allMetrics, ['Gross Commission Achieved', 'Personal Gross Commission Income', 'Gross Commission Income']))}</div>
      `;

      if (!data.length) {
        container.innerHTML = '<div class="empty">No results yet. Add sections and metrics in the Input tab.</div>';
        return;
      }

      container.innerHTML = data.map(section => {
        const scores = section.metrics.map(m => calc(m, 'monthly')).filter(v => v !== null);
        const avg = scores.length ? Math.round(scores.reduce((a,b) => a + b, 0) / scores.length) : null;
        return `
          <div class="section">
            <div class="section-header"><span>${escapeHtml(section.name)}</span><span>Monthly Avg: ${formatPct(avg)}</span></div>
            <table>
              <thead>
                <tr><th>Metric</th><th>Daily</th><th>Progress</th><th>Weekly</th><th>Progress</th><th>Monthly</th><th>Progress</th></tr>
              </thead>
              <tbody>
                ${section.metrics.map(metric => `
                  <tr>
                    <td><strong>${escapeHtml(metric.name)}</strong></td>
                    <td>${ratioText(metric, 'daily')}</td>
                    <td>${visual(metric, 'daily')}</td>
                    <td>${ratioText(metric, 'weekly')}</td>
                    <td>${visual(metric, 'weekly')}</td>
                    <td>${ratioText(metric, 'monthly')}</td>
                    <td>${visual(metric, 'monthly')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }).join('');
    }

    function renderProjectInput() {
      const container = document.getElementById('projectInputSections');
      if (!projectData.length) {
        container.innerHTML = '<div class="empty">No project sections yet. Add your first project section.</div>';
        return;
      }

      container.innerHTML = projectData.map(section => `
        <div class="input-section">
          <div class="input-section-top">
            <input class="section-name" value="${escapeHtml(section.name)}" oninput="updateProjectSection('${section.id}', this.value)" />
            <button class="btn-danger" onclick="deleteProjectSection('${section.id}')">Delete</button>
          </div>
          ${section.tasks.map(task => `
            <div class="task-editor">
              <div class="task-title-row">
                <input value="${escapeHtml(task.name)}" placeholder="Task name" oninput="updateTask('${section.id}', '${task.id}', 'name', this.value)" />
                <select onchange="updateTask('${section.id}', '${task.id}', 'status', this.value)">
                  <option value="On Hold" ${task.status === 'On Hold' ? 'selected' : ''}>On Hold</option>
                  <option value="In Progress" ${task.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                  <option value="Pending" ${task.status === 'Pending' ? 'selected' : ''}>Pending</option>
                  <option value="Done" ${task.status === 'Done' ? 'selected' : ''}>Done</option>
                </select>
                <button class="btn-danger" onclick="deleteTask('${section.id}', '${task.id}')">Delete Task</button>
              </div>
            </div>
          `).join('')}
          <div style="margin-top:14px;"><button class="btn-blue" onclick="addTask('${section.id}')">+ Add Task</button></div>
        </div>
      `).join('');
    }

    function renderProjectResults() {
      const container = document.getElementById('projectResultsGrid');
      if (!projectData.length) {
        container.innerHTML = '<div class="empty">No project results yet. Add project sections and tasks.</div>';
        return;
      }

      container.innerHTML = projectData.map(section => `
        <div class="project-card">
          <h3>${escapeHtml(section.name)}</h3>
          ${projectVisual(section)}
        </div>
      `).join('');
    }

    function renderProject() {
      renderProjectInput();
      renderProjectResults();
    }

    function render() {
      document.getElementById('dashboardMonth').value = dashboardMonth;
      renderInput();
      renderResults();
      renderProject();
      showProjectSubTab(activeProjectSubTab);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.getElementById('inputTabBtn').addEventListener('click', () => showTab('input'));
    document.getElementById('resultsTabBtn').addEventListener('click', () => showTab('results'));
    document.getElementById('projectTabBtn').addEventListener('click', () => showTab('project'));
    document.getElementById('projectInputSubBtn').addEventListener('click', () => showProjectSubTab('input'));
    document.getElementById('projectResultsSubBtn').addEventListener('click', () => showProjectSubTab('results'));
    document.getElementById('addSectionBtn').addEventListener('click', addSection);
    document.getElementById('addProjectSectionBtn').addEventListener('click', addProjectSection);
    document.getElementById('dashboardMonth').addEventListener('input', e => updateMonth(e.target.value));

    render();
  </script>
</body>
</html>
